# =============================================================================
# 跨品种因子注册表
# 声明品种 → 跨品种共享因子目录的映射关系
# 用于 CU_run_all.py / NI_run_all.py 等调度器统一发现和调用跨品种因子
# =============================================================================

# ---------------------------------------------------------------------------
# CU_NI 目录：LME 铜镍升贴水
# 服务品种：CU（沪铜）、NI（沪镍）
# ---------------------------------------------------------------------------
CU_NI:
  description: "LME 铜镍升贴水跨品种共享因子"
  factor_scripts:
    - name: "CU_NI_抓取LME升贴水_EVENT"
      file: "CU_NI/CU_NI_抓取LME升贴水_EVENT.py"
      factor_codes:
        - "CU_NI_LME升贴水"
  served_symbols:
    - CU
    - NI

# ---------------------------------------------------------------------------
# ZN_PB_SN 目录：LME 锌铅锡 3M
# 服务品种：ZN（沪锌）、PB（沪铅）、SN（沪锡）
# ---------------------------------------------------------------------------
ZN_PB_SN:
  description: "LME 锌铅锡 3M 跨品种共享因子"
  factor_scripts:
    - name: "ZN_PB_SN_LME升贴水"
      file: "ZN_PB_SN/ZN_PB_SN_LME升贴水.py"
      factor_codes:
        - "ZN_PB_SN_LME升贴水"
  served_symbols:
    - ZN
    - PB
    - SN

# ---------------------------------------------------------------------------
# _shared 目录：通用工具模块（被全部品种共用）
# ---------------------------------------------------------------------------
_shared:
  description: "通用工具模块，非因子脚本"
  factor_scripts: []
  served_symbols:
    - ALL
