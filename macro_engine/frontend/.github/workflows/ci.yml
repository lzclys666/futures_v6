name: CI/CD — Futures Trading Frontend

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  lint-and-typecheck:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Type check
        run: npx tsc --noEmit -p tsconfig.app.json

  build-mock:
    name: Build (Mock Mode)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
        env:
          VITE_USE_MOCK: 'true'

      - name: Verify dist
        run: echo "dist size: $(du -sh dist | cut -f1)" && ls dist

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-mock
          path: dist/
          retention-days: 7

  build-real:
    name: Build (Real API)
    runs-on: ubuntu-latest
    needs: lint-and-typecheck
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build (Real API)
        run: npm run build
        env:
          VITE_USE_MOCK: 'false'

      - name: Upload dist artifact
        uses: actions/upload-artifact@v4
        with:
          name: dist-real
          path: dist/
          retention-days: 7
